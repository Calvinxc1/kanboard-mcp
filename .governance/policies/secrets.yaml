id: secrets
when: [docs_or_operator_work, client_or_config_work, mcp_tool_work]
rules:
  - Never print, commit, or echo `KANBOARD_API_TOKEN` or equivalent credentials.
  - Keep `.env` untracked and use `.env.example` or placeholder values for documentation.
  - Do not add tests that require real credentials by default.
  - Redact tokens, passwords, authorization headers, and private deployment details in diagnostics.
  - Use placeholder URLs and token values in examples unless the user explicitly asks to configure a local private environment.
  - If a command could expose environment variables, use a narrower command or explain why it is unsafe.
