id: task_map
default_load:
  - AGENTS.md
  - .governance/policies/universal.yaml
routes:
  file_or_command_work:
    - .governance/policies/execution.yaml
    - .governance/policies/safety.yaml
  mcp_tool_work:
    - .governance/policies/execution.yaml
    - .governance/policies/safety.yaml
    - .governance/policies/mcp-api-contracts.yaml
    - .governance/policies/testing.yaml
    - .governance/policies/secrets.yaml
  client_or_config_work:
    - .governance/policies/execution.yaml
    - .governance/policies/safety.yaml
    - .governance/policies/mcp-api-contracts.yaml
    - .governance/policies/secrets.yaml
    - .governance/policies/testing.yaml
  docs_or_operator_work:
    - .governance/policies/execution.yaml
    - .governance/policies/safety.yaml
    - .governance/policies/secrets.yaml
    - .governance/policies/local-usage.yaml
  test_work:
    - .governance/policies/execution.yaml
    - .governance/policies/testing.yaml
  gitflow_work:
    - .governance/policies/gitflow.yaml
